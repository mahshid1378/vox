# Default model configuration for vox TTS backends.
# Override by placing a models.toml in ~/.config/vox/models.toml

[kokoro]
model_url = "https://github.com/mzdk100/kokoro/releases/download/V1.0/kokoro-v1.0.onnx"
model_file = "kokoro-v1.0.onnx"
voices_url = "https://github.com/mzdk100/kokoro/releases/download/V1.0/voices.bin"
voices_file = "voices.bin"
subdir = "kokoro"

[piper]
# Piper models are managed via `vox pack install`
subdir = "packs"

[qwen-native]
model_id = "Qwen/Qwen3-TTS-12Hz-0.6B-Base"
